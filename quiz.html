<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civil SBTI · 小测试 v5</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { background: linear-gradient(180deg, #0b1020 0%, #121933 45%, #0f172a 100%); }
    .glass { backdrop-filter: blur(10px); background: rgba(255,255,255,.06); }
    .chip { border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); }
  </style>
</head>
<body class="text-slate-100 min-h-screen">
  <div class="max-w-4xl mx-auto px-4 py-8 md:px-8">
    <header class="mb-10">
      <a href="index.html" class="inline-block mb-6 text-sm text-sky-300 hover:underline">← 返回人格图鉴</a>
      <h1 class="text-4xl font-black tracking-tight">Civil SBTI 小测试 v5</h1>
      <p class="mt-3 text-slate-300">12 道抽象题 · 强分流版 · 修复 SAFE 吸星大法</p>
    </header>
    <main id="appRoot" class="space-y-8">
      <section id="quizContainer" class="space-y-4"></section>
      <div class="flex flex-wrap gap-3">
        <button id="submitQuiz" class="rounded-2xl bg-emerald-400 text-slate-950 px-4 py-2 font-semibold hover:bg-emerald-300 transition">提交测试</button>
        <button id="resetQuiz" class="rounded-2xl chip px-4 py-2">重置</button>
      </div>
      <div id="resultBox" class="hidden glass rounded-3xl p-6 mt-6"></div>
    </main>
  </div>
<script>
const state = { questions: [], outcomes: [], dimensions: [] };
function encodeLevel(l){ return l === 'L' ? 0 : l === 'M' ? 1 : 2; }
function findDim(id){ return state.dimensions.find(d => d.id === id); }
async function loadData(){
  const [q,o,d] = await Promise.all([fetch('./data/questions.json'), fetch('./data/outcomes.json'), fetch('./data/dimensions.json')]);
  state.questions = (await q.json()).questions;
  state.outcomes = (await o.json()).outcomes;
  state.dimensions = (await d.json()).dimensions;
  renderQuiz();
}
function renderQuiz(){
  const container = document.getElementById('quizContainer');
  container.innerHTML = state.questions.map(q => `
    <div class="glass rounded-3xl p-5">
      <div class="text-sm text-slate-400">Q${q.id} · ${findDim(q.dimension)?.name || q.dimension}</div>
      <div class="text-lg font-semibold mt-2">${q.text}</div>
      <div class="mt-4 space-y-3">
        ${q.options.map(opt => `
          <label class="block rounded-2xl border border-white/10 bg-white/5 px-4 py-3 cursor-pointer hover:bg-white/10">
            <input type="radio" name="q_${q.id}" value="${opt.score}" class="mr-2" />
            <b>${opt.label}.</b> ${opt.text}
          </label>
        `).join('')}
      </div>
    </div>
  `).join('');
}
function aggregateAnswersMajority(raw){
  const result = {};
  state.dimensions.forEach(d => {
    const arr = raw[d.id] || [];
    if (!arr.length) { result[d.id] = 'M'; return; }
    if (arr.length === 1) { result[d.id] = arr[0]; return; }
    const counts = {L:0, M:0, H:0};
    arr.forEach(v => counts[v]++);
    if (counts.L && counts.H && !counts.M) { result[d.id] = 'M'; return; }
    if (counts.L >= counts.M && counts.L > 0) { result[d.id] = 'L'; return; }
    if (counts.H >= counts.M && counts.H > 0) { result[d.id] = 'H'; return; }
    result[d.id] = 'M';
  });
  return result;
}
function collectAnswers(){
  const raw = {}; const missing = [];
  state.questions.forEach(q => {
    const c = document.querySelector(`input[name="q_${q.id}"]:checked`);
    if (!c) { missing.push(q.id); return; }
    raw[q.dimension] = raw[q.dimension] || []; raw[q.dimension].push(c.value);
  });
  return { answers: aggregateAnswersMajority(raw), missing };
}
function distance(p,a){ return Object.keys(p).reduce((s,k)=>s+Math.abs(encodeLevel(p[k]) - encodeLevel(a[k] || 'M')), 0); }
function computeRanking(ans){ return state.outcomes.map(o => ({...o, dist: distance(o.pattern, ans)})).sort((a,b)=>a.dist-b.dist); }
function renderResult(best, ranking, answers){
  const answerBadges = Object.entries(answers).map(([key,val]) => {
    const dim = findDim(key);
    const cls = val === 'H' ? 'bg-rose-400/20 text-rose-200 border-rose-400/30' : val === 'M' ? 'bg-amber-400/20 text-amber-200 border-amber-400/30' : 'bg-emerald-400/20 text-emerald-200 border-emerald-400/30';
    return `<span class="rounded-full px-3 py-2 text-xs border ${cls}">${dim ? dim.name : key} · ${val}</span>`;
  }).join('');
  const similarity = Math.round((1 - best.dist / (Object.keys(best.pattern).length * 2)) * 100);
  const box = document.getElementById('resultBox');
  box.innerHTML = `
    <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-6">
      <div>
        <div class="text-sky-300 font-mono text-sm">${best.code}</div>
        <h2 class="text-3xl font-black">${best.cn} · ${best.en}</h2>
        <p class="mt-2 text-slate-300">${best.tagline}</p>
        <p class="mt-4 text-slate-200 leading-7">${best.intro}</p>
      </div>
      <div class="glass rounded-2xl p-4 min-w-[180px]">
        <div class="text-sm text-slate-400">匹配度</div>
        <div class="text-4xl font-black mt-1">${similarity}%</div>
        <div class="text-sm text-slate-400 mt-2">多数派聚合 + 最近邻匹配</div>
      </div>
    </div>
    <div class="mt-6 grid md:grid-cols-2 gap-4">
      <div class="glass rounded-2xl p-4">
        <h4 class="font-semibold text-sky-200">你的维度画像</h4>
        <div class="mt-3 flex flex-wrap gap-2">${answerBadges}</div>
      </div>
      <div class="glass rounded-2xl p-4">
        <h4 class="font-semibold text-emerald-200">Top 3 匹配</h4>
        <div class="mt-3 space-y-2 text-sm text-slate-300">
          ${ranking.slice(0,3).map((item, idx) => `<div>${idx+1}. <b>${item.code}</b> · ${item.cn} <span class="text-slate-500">(距离 ${item.dist})</span></div>`).join('')}
        </div>
      </div>
    </div>
    <div class="mt-6 flex flex-wrap gap-3">
      <a href="index.html#gallery" class="rounded-2xl bg-sky-400 text-slate-950 px-4 py-2 font-semibold hover:bg-sky-300">查看完整人格</a>
      <button id="copySummary" class="rounded-2xl chip px-4 py-2">复制结果摘要</button>
    </div>`;
  box.classList.remove('hidden');
  box.scrollIntoView({behavior:'smooth'});
  const copyBtn = document.getElementById('copySummary');
  copyBtn.addEventListener('click', async () => {
    const text = `我的土木 SBTI 结果：${best.code} · ${best.cn}｜${best.tagline}｜匹配度 ${similarity}%`;
    try { await navigator.clipboard.writeText(text); copyBtn.textContent = '已复制'; setTimeout(()=>copyBtn.textContent='复制结果摘要', 1500); }
    catch { copyBtn.textContent = '复制失败'; setTimeout(()=>copyBtn.textContent='复制结果摘要', 1500); }
  });
}
document.getElementById('submitQuiz').onclick = () => {
  const {answers, missing} = collectAnswers();
  if (missing.length) {
    alert(`你还有未答完的题：Q${missing.join(', ')}`);
    return;
  }
  const ranking = computeRanking(answers);
  renderResult(ranking[0], ranking, answers);
};
document.getElementById('resetQuiz').onclick = () => {
  document.querySelectorAll('input[type=radio]').forEach(i=>i.checked=false);
  document.getElementById('resultBox').classList.add('hidden');
  document.getElementById('resultBox').innerHTML = '';
};
loadData().catch(err => {
  document.body.innerHTML = `<div class="max-w-2xl mx-auto px-6 py-10 text-slate-100"><h1 class="text-3xl font-bold">加载失败</h1><pre class="mt-4 p-4 rounded-2xl bg-white/5 overflow-auto text-sm">${String(err)}</pre></div>`;
  console.error(err);
});
</script>
</body>
</html>
